<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <style>
        /* --- GLOBAL & SMOOTH SCROLLING --- */
        html { 
            scroll-behavior: smooth; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #eef2f7; 
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .main-nav {
            background-color: #cfc4bc; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            width: 100%;
            justify-content: flex-start; 
            align-items: center;
            height: 100px; 
            box-sizing: border-box;
            flex-wrap: nowrap;
        }

        .logo-container {
            margin-right: 5px; 
            flex-shrink: 0;
        }

        .logo-container img {
            height: 140px; 
            width: auto;
            display: block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
            transition: transform 0.3s ease;
        }

        .logo-container a:hover img {
            transform: scale(1.05);
        }

        .nav-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 0px; 
            align-items: center;
            flex-wrap: nowrap;
        }

        .nav-item {
            flex-shrink: 0;
        }

        .nav-link img {
            height: 200px; 
            width: auto;
            display: block;
            margin: 0 -15px; 
            transition: transform 0.3s ease;
        }

        .nav-link:hover img {
            transform: scale(1.1);
            position: relative;
            z-index: 10;
        }

        /* --- BODY CONTENT (Stacked Images) --- */
        .about-container {
            width: 100%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
        }

        .about-page-img {
            width: 100%; 
            height: auto;
            display: block;
        }

        .flipbook-link {
            width: 100%;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }

        /* Mobile Styles */
        @media (max-width: 768px) {
            .main-nav {
                height: auto;
                flex-direction: column;
                padding: 10px;
            }
            .logo-container img {
                height: 80px;
                margin-bottom: 10px;
            }
            .nav-list {
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
            }
            .nav-link img {
                height: 100px;
                margin: 0 -5px;
            }
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="logo-container">
            <a href="index.html">
                <img src="logo.png" alt="Logo">
            </a>
        </div>

        <ul class="nav-list">
            <li class="nav-item">
                <a href="editorial.html" class="nav-link">
                    <img src="Untitled design (3) (5).png" alt="Editorial">
                </a>
            </li>
            <li class="nav-item">
                <a href="features.html" class="nav-link">
                    <img src="Untitled design (3) (6).png" alt="Feature">
                </a>
            </li>
            <li class="nav-item">
                <a href="opinion.html" class="nav-link">
                    <img src="Untitled design (3) (7).png" alt="Opinion">
                </a>
            </li>
            <li class="nav-item">
                <a href="about.html" class="nav-link">
                    <img src="about.png" alt="About">
                </a>
            </li>
            <li class="nav-item">
                <a href="references.html" class="nav-link">
                    <img src="ref.png" alt="References">
                </a>
            </li>
        </ul>
    </nav>

    <div class="about-container">
        <img src="team.png" alt="Meet the Team" class="about-page-img">
        
        <img src="hon.png" alt="Honorary Members" class="about-page-img">
        
        <a href="https://heyzine.com/flip-book/a30428675b.html" target="_blank" class="flipbook-link">
            <img src="aboutbut.png" alt="View Flipbook" class="about-page-img">
        </a>
    </div>

</body>
</html>
