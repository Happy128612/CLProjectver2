<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opinion - CLProject</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #eef2f7; 
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Enable scrolling for the long opinion pieces */
            overflow-y: auto; 
            overflow-x: hidden;
        }

        .main-nav {
            background-color: #cfc4bc; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            width: 100%;
            justify-content: flex-start; 
            align-items: center;
            height: 100px; 
            box-sizing: border-box;
            flex-wrap: nowrap; 
        }

        .logo-container {
            margin-right: 5px; 
            flex-shrink: 0;
        }

        .logo-container img {
            height: 140px; 
            width: auto;
            display: block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
            transition: transform 0.3s ease;
        }

        .nav-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 0px; 
            align-items: center;
            flex-wrap: nowrap;
        }

        .nav-item {
            flex-shrink: 0;
        }

        .nav-link {
            display: block;
            text-decoration: none;
            transform: translateY(2px); 
        }

        .nav-link img {
            height: 200px; 
            width: auto;
            display: block;
            margin: 0 -15px; 
            transition: transform 0.3s ease;
        }

        .nav-link:hover img {
            transform: scale(1.1);
            position: relative;
            z-index: 10;
        }

        .logo-container a:hover img {
            transform: scale(1.05);
        }

        /* Container for the stacked opinion images */
        .opinion-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
        }

        .opinion-image {
            width: 100%;
            height: auto; 
            display: block;
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="logo-container">
            <a href="index.html">
                <img src="logo.png" alt="Logo">
            </a>
        </div>

        <ul class="nav-list">
            <li class="nav-item">
                <a href="editorial.html" class="nav-link">
                    <img src="Untitled design (3) (5).png" alt="Editorial">
                </a>
            </li>
            <li class="nav-item">
                <a href="features.html" class="nav-link">
                    <img src="Untitled design (3) (6).png" alt="Feature">
                </a>
            </li>
            <li class="nav-item">
                <a href="opinion.html" class="nav-link">
                    <img src="Untitled design (3) (7).png" alt="Opinion">
                </a>
            </li>
            <li class="nav-item">
                <a href="about.html" class="nav-link">
                    <img src="about.png" alt="Opinion 2">
                </a>
            </li>
        </ul>
    </nav>

    <div class="opinion-content">
        <img src="OP.png" alt="Opinion Board" class="opinion-image">
    </div>

</body>
</html>
